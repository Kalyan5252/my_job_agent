BadRequest:
  description: Invalid request payload or missing required fields.
  content:
    application/json:
      schema:
        $ref: ./schemas.yaml#/ErrorResponse
      example:
        statusCode: 400
        error: Bad Request
        message: job.applyUrl is required

Unauthorized:
  description: Authentication or saved browser session is required.
  content:
    application/json:
      schema:
        $ref: ./schemas.yaml#/ErrorResponse
      example:
        statusCode: 401
        error: Unauthorized
        message: Auth session missing or expired

NotFound:
  description: Resource not found.
  content:
    application/json:
      schema:
        $ref: ./schemas.yaml#/ErrorResponse
      example:
        statusCode: 404
        error: Not Found
        message: Route not found

InternalServerError:
  description: Unexpected server error.
  content:
    application/json:
      schema:
        $ref: ./schemas.yaml#/ErrorResponse
      example:
        statusCode: 500
        error: Internal Server Error
        message: Unexpected failure
